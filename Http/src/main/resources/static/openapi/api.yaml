openapi: 3.0.3
info:
  title: BTUK Backend API
  version: 1.0.0
servers:
  - url: http://localhost:8080/api
security:
  - BearerAuth: [ ]
paths:
  /auth/user/token:
    post:
      tags:
        - Authentication
      operationId: issueUserToken
      summary: Obtain JWT token for user
      security: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/client/token:
    post:
      tags:
        - Authentication
      operationId: issueClientToken
      summary: Obtain JWT token for client
      security: [ ]
      parameters:
        - in: header
          name: X-API-CLIENT-ID
          schema:
            type: string
            format: uuid
          required: true
        - in: header
          name: X-API-KEY-ID
          schema:
            type: string
            format: uuid
          required: true
        - in: header
          name: X-API-KEY
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /admin/clients/create:
    post:
      tags:
        - AdminClient
      operationId: createClient
      summary: Create a new client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClientRequest'
      responses:
        '200':
          description: Client created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateClientResponse'
  /admin/clients/{clientId}/keys/create:
    post:
      tags:
        - AdminClient
      operationId: createKey
      summary: Create new key for a client
      parameters:
        - in: path
          name: clientId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateKeyRequest'
      responses:
        '200':
          description: Key created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateKeyResponse'
  /admin/clients/{clientId}/keys/{keyId}/revoke:
    post:
      tags:
        - AdminClient
      operationId: revokeKey
      summary: Revokes a key for a client
      parameters:
        - in: path
          name: clientId
          required: true
          schema:
            type: string
        - in: path
          name: keyId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Key revoked
  /admin/clients/{clientId}/update:
    patch:
      tags:
        - AdminClient
      operationId: updateClient
      summary: Update a client
      parameters:
        - in: path
          name: clientId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClientRequest'
      responses:
        '200':
          description: Client updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateClientResponse'
  /admin/clients/{clientId}/disable:
    delete:
      tags:
        - AdminClient
      operationId: disableClient
      summary: Disables a client
      parameters:
        - in: path
          name: clientId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Client disabled
  /admin/clients:
    get:
      tags:
        - AdminClient
      operationId: getClients
      summary: List all clients
      responses:
        '200':
          description: List of clients
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListClientsResponse'

  /team/create:
    post:
      tags:
        - Teams
      operationId: createTeam
      summary: Create a team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTeamRequest'
      responses:
        '200':
          description: Team created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTeamResponse'
        '400':
          description: Team already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /team/delete:
    delete:
      tags:
        - Teams
      operationId: deleteTeam
      summary: Delete a team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteTeamRequest'
      responses:
        '200':
          description: Team deleted
        '404':
          description: Team not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Team has regions linked to it, unable to remove.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /team/create/region:
    post:
      tags:
        - Teams
      operationId: createTeamRegion
      summary: Create a team region
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTeamRegionRequest'
      responses:
        '200':
          description: Team region created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTeamRegionResponse'
  /team/delete/region:
    delete:
      tags:
        - Teams
      operationId: deleteTeamRegion
      summary: Delete a team region
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteTeamRegionRequest'
      responses:
        '200':
          description: Team region deleted
        '404':
          description: Team region not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /team/switch/region:
    patch:
      tags:
        - Teams
      operationId: switchTeamRegion
      summary: Switches a team region to another team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SwitchTeamRegionRequest'
      responses:
        '200':
          description: Team region switch to another team
        '404':
          description: Team or team region not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /team/{teamId}/regions:
    get:
      tags:
        - Teams
      operationId: getTeamRegions
      summary: Gets all regions for a team
      parameters:
        - in: path
          name: teamId
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: List of regions for a team
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TeamRegion'
        '204':
          description: Team has no regions
        '404':
          description: Team not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /team/{teamId}/servers:
    get:
      tags:
        - Teams
      operationId: getTeamServers
      summary: Gets all servers for a team
      parameters:
        - in: path
          name: teamId
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: List of servers for a team
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Server'
        '204':
          description: Team has no servers
        '404':
          description: Team not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /teams:
    get:
      tags:
        - Teams
      operationId: listTeams
      summary: List all teams
      responses:
        '200':
          description: List of teams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Team'
        '204':
          description: There are no teams

  /server/create:
    post:
      tags:
        - Servers
      operationId: createServer
      summary: Create a server for a team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateServerRequest'
      responses:
        '200':
          description: Server created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateServerResponse'
        '400':
          description: Server already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: User not authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /server/delete:
    delete:
      tags:
        - Servers
      operationId: deleteServer
      summary: Delete a server
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteServerRequest'
      responses:
        '200':
          description: Server deleted
        '403':
          description: User not authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Server not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Server has regions linked to it, unable to remove.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /server/switch:
    patch:
      tags:
        - Servers
      operationId: switchServer
      summary: Switches a server to another team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SwitchServerRequest'
      responses:
        '200':
          description: Server switched to another team
        '403':
          description: User not authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Server or team not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /server/create/region:
    post:
      tags:
        - Servers
      operationId: createServerRegion
      summary: Create a region for a server
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateServerRegionRequest'
      responses:
        '200':
          description: Server region created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateServerRegionResponse'
        '403':
          description: User not authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /server/delete/region:
    delete:
      tags:
        - Servers
      operationId: deleteServerRegion
      summary: Delete a region for a server
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteServerRegionRequest'
      responses:
        '200':
          description: Server region deleted
        '403':
          description: User not authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Server region not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /server/switch/region:
    patch:
      tags:
        - Servers
      operationId: switchServerRegion
      summary: Switch the server for a server region
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SwitchServerRegionRequest'
      responses:
        '200':
          description: Server region switched to another server
        '403':
          description: User not authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Server or region not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /server/{serverId}/regions:
    get:
      tags:
        - Servers
      operationId: getServerRegions
      summary: Get all server regions for a server
      parameters:
        - in: path
          name: serverId
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: List of regions for a server
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ServerRegion'
        '204':
          description: Server has no regions
        '404':
          description: Server not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /regions:
    get:
      tags:
        - Regions
      operationId: getRegions
      summary: List regions
      parameters:
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/RegionStatus"
          description: Optional status filter (e.g., CLAIMED)
      responses:
        '200':
          description: Regions list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Region'
  /region/summary/{id}:
    get:
      tags:
        - Regions
      operationId: getRegionByID
      summary: Get region by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Region
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Region'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /region/claim:
    post:
      tags:
        - Claims
      operationId: createClaim
      summary: Puts in a request to create a claim
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegionClaimRequest'
      responses:
        '200':
          description: Request processed successfully. See response body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegionClaimResponse'
        '500':
          description: Internal service error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /region/approvals/recalculate/{id}:
    post:
      tags:
        - Approvals
      operationId: recalculateValidityAndApprovals
      summary: Recalculates the validity and approval requirements of an In_Approval claim
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Recalculation occurred. See response body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecalculateValidityResponse'
        '500':
          description: Internal service error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /region/approvals/getReviewerApprovals:
    get:
      tags:
        - Approvals
      operationId: getReviewerApprovals
      summary: Gets a list of claims requiring approval from reviewers
      responses:
        '200':
          description: List of reviewer approvals
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    regionId:
                      type: integer
                      format: int32
                    approval_reasons:
                      type: object
                      properties:
                        CLAIM_AREA:
                          type: boolean
                        TOTAL_CLAIMED_AREA:
                          type: boolean
                        INACTIVE_OVERLAP:
                          type: boolean
                        SECTION_SAVE_OVERLAP:
                          type: boolean
                      required:
                        - CLAIM_AREA
                        - TOTAL_CLAIMED_AREA
                        - INACTIVE_OVERLAP
                        - SECTION_SAVE_OVERLAP
                    area:
                      type: number
                      format: double
                    created_at:
                      type: string
                      format: date-time
                    region_owner:
                      type: string
                  required:
                    - regionId
                    - approval_reasons
                    - area
                    - created_at
                    - region_owner
        '500':
          description: Internal service error.
          content:
            application/json:
              schema:
                type: string
  /region/approvals/getPlayerApprovals:
    get:
      tags:
        - Approvals
      operationId: getPlayerApprovals
      summary: Gets a list of claims requiring approval from a player
      parameters:
        - in: query
          name: uuid
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of player approvals
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    regionId:
                      type: integer
                      format: int32
                    saveId:
                      type: integer
                      format: int32
                    region_owner:
                      type: string
                  required:
                    - regionId
                    - saveId
                    - region_owner
        '500':
          description: Internal service error.
          content:
            application/json:
              schema:
                type: string
  /region/approvals/reviewerApprove:
    post:
      tags:
        - Approvals
      operationId: approveRegion
      summary: Reviewer approves or rejects a region
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                regionId:
                  type: integer
                  format: int32
                approve:
                  type: boolean
              required:
                - regionId
                - approve
      responses:
        '200':
          description: Approval decision recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
  /region/approvals/overclaimApprove:
    post:
      tags:
        - Approvals
      operationId: approveOverclaim
      summary: Player approves or rejects an overclaim
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                regionId:
                  type: integer
                  format: int32
                saveId:
                  type: integer
                  format: int32
                approve:
                  type: boolean
              required:
                - regionId
                - saveId
                - approve
      responses:
        '200':
          description: Overclaim approval decision recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
  /region/inactivity:
    get:
      tags:
        - Inactivity
      operationId: getInactiveRegions
      summary: Returns a list of claimed regions which have little inactive
      parameters:
        - in: query
          name: teamID
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Request processed successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InactiveRegion'
        '500':
          description: Internal service error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /region/inactivity/sleep/{id}:
    post:
      tags:
        - Inactivity
      operationId: sleepRegion
      summary: Marks a region as sleeping
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Region asleep
        404:
          description: Region not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /region/inactivity/kill/{id}:
    post:
      tags:
        - Inactivity
      operationId: killRegion
      summary: Archives and removes the progress and marks the region as dead.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Region killed
        404:
          description: Region not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /region/inactivity/awake/{id}:
    post:
      tags:
        - Inactivity
      operationId: awakeRegion
      summary: Marks a sleeping region as claimed.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Region awake
        404:
          description: Region not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /region/claimPlot:
    post:
      tags:
        - Plots
      operationId: claimPlot
      summary: Player claims an existing plot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                uuid:
                  type: string
                regionId:
                  type: integer
                  format: int32
              required:
                - uuid
                - regionId
      responses:
        '200':
          description: Request processed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegionClaimResponse'
  /region/createPlot:
    post:
      tags:
        - Plots
      operationId: createPlot
      summary: Architect creates a plot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                uuid:
                  type: string
                teamId:
                  type: integer
                  format: int32
                geometry_bounds:
                  type: array
                  items:
                    $ref: '#/components/schemas/Coordinate'
                  minItems: 4
              required:
                - uuid
                - teamId
                - geometry_bounds
      responses:
        '200':
          description: Plot created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegionClaimResponse'
  /region/archive:
    post:
      tags:
        - Regions
      operationId: archiveRegion
      summary: Creates an archive of a region
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                regionId:
                  type: integer
                  format: int32
                saveId:
                  type: integer
                  format: int32
                archiveType:
                  type: string
                  enum: [INITIAL, REVIEWER_KILLED, OVERCLAIMED_KILLED, DELETION, SAVE]
                minecraftVersion:
                  type: string
                schematic:
                  type: string
                  format: binary
              required:
                - regionId
                - archiveType
                - minecraftVersion
                - schematic
      responses:
        '201':
          description: Archive created
          content:
            application/json:
              schema:
                type: object
                properties:
                  archiveId:
                    type: integer
                  filePath:
                    type: string
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Region not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /region/delete:
    post:
      tags:
        - Regions
      operationId: deleteRegion
      summary: Player deletes a region
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                regionId:
                  type: integer
                  format: int32
                archive:
                  type: boolean
              required:
                - regionId
      responses:
        '200':
          description: Region deleted (status set to DELETED)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
  /region/abandonPlot:
    post:
      tags:
        - Plots
      operationId: abandonPlot
      summary: Player abandons a plot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                regionId:
                  type: integer
                  format: int32
              required:
                - regionId
      responses:
        '200':
          description: Plot abandoned
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
  /membership/add:
    post:
      tags:
        - Membership
      operationId: AddMember
      summary: Adds a player as a member to a region
      parameters:
        - in: query
          name: region
          description: The ID of the region to join
          required: true
          schema:
            type: integer
            format: int32
        - in: query
          name: player
