    TeamRegion:
      type: object
      properties:
        id:
          type: integer
          format: int32
        name:
          type: string
        geometry_bounds:
          type: array
          items:
            $ref: '#/components/schemas/Coordinate'
          minItems: 4
      required:
        - id
        - name
        - geometry_bounds
    Server:
      type: object
      properties:
        id:
          type: integer
          format: int32
        name:
          type: string
      required:
        - id
        - name
    ServerRegion:
      type: object
      properties:
        id:
          type: integer
          format: int32
        name:
          type: string
        geometry_bounds:
          type: array
          items:
            $ref: '#/components/schemas/Coordinate'
          minItems: 4
      required:
        - id
        - name
        - geometry_bounds
    CreateServerRequest:
      type: object
      properties:
        user:
