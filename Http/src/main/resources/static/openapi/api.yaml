components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT Bearer token. Use the Authorize button and paste: Bearer <token>"
  schemas:
    ErrorResponse:
      type: object
      properties:
        errorCode:
          type: string
          enum:
            - USER_NOT_AUTHORIZED
            - INVALID_CREDENTIALS
            - TEAM_NOT_FOUND
            - TEAM_ALREADY_EXISTS
            - TEAM_HAS_REGIONS
            - TEAM_REFERENCED_BY_ENTITIES
            - INCORRECT_TEAM
            - TEAM_REGION_NOT_FOUND
            - TEAM_REGION_CONFLICT
            - TEAM_REGION_ALREADY_EXISTS
            - SERVER_NOT_FOUND
            - SERVER_ALREADY_EXISTS
            - SERVER_HAS_REGIONS
            - SERVER_REFERENCED_BY_ENTITIES
            - SERVER_REGION_NOT_FOUND
            - SERVER_REGION_CONFLICT
            - SERVER_REGION_ALREADY_EXISTS
            - NOT_CONTAINED_BY_TEAM_REGION
            - REGION_NOT_FOUND
            - SECTION_SAVE_NOT_FOUND
            - SECTION_SAVE_NOT_VALID_STATUS
            - SUBMISSION_NOT_FOUND
            - SUBMISSION_NOT_SUBMITTED
            - INTERNAL_SERVER_ERROR
            - REGION_NOT_ASLEEP
            - REGION_NOT_CLAIMED
          description: A standardized error code for client-side localization
        parameters:
          type: array
          items:
            type: string
          description: Parameters to add to the client-side error message
      required:
        - errorCode

    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password
    TokenResponse:
      type: object
      properties:
        token:
          type: string
        expiresAtEpochSeconds:
          type: integer
          format: int64
    Region:
      type: object
      properties:
        id:
          type: integer
          format: int32
        status:
          $ref: "#/components/schemas/RegionStatus"
        tag:
          type: string
        description:
          type: string
    RegionStatus:
      type: string
      enum:
        - READY
        - IN_APPROVAL
        - REJECTED
        - CLAIMED
        - SUBMITTED
        - ACCEPTED
        - DELETED
    CreateClientRequest:
      type: object
      properties:
        teamName:
          type: string
        allowedCidrs:
          type: string
      required:
        - teamName
    CreateClientResponse:
      type: object
      properties:
        clientId:
          type: string
      required:
        - clientId
    CreateKeyRequest:
      type: object
      properties:
        expiresAtEpochSeconds:
          type: integer
          format: int64
    CreateKeyResponse:
      type: object
      properties:
        clientId:
          type: string
        keyId:
          type: string
        secret:
          type: string
      required:
        - clientId
        - keyId
        - secret
    UpdateClientRequest:
      type: object
      properties:
        status:
          type: string
        allowedCidrs:
          type: string
    UpdateClientResponse:
      type: object
      properties:
        clientId:
          type: string
        name:
          type: string
        status:
          type: string
        allowedCidrs:
          type: string
      required:
        - clientId
        - name
        - status
        - allowedCidrs
    ListClientsResponse:
      type: array
      items:
        $ref: '#/components/schemas/Client'
    Client:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
        allowedCidrs:
          type: string
        lastSeenAt:
          type: integer
          format: int64
    RegionClaimRequest:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/TeamUser'
        geometry_bounds:
          type: array
          items:
            $ref: '#/components/schemas/Coordinate'
          minItems: 4
      required:
        - uuid
        - teamId
        - geometry_bounds

    RegionClaimResponse:
      type: object
      properties:
        result:
          $ref: '#/components/schemas/ClaimResult'
      required:
        - result

    RecalculateValidityResponse:
      type: object
      properties:
        result:
          $ref: '#/components/schemas/ClaimResult'
        approval_requirements_changed:
          type: boolean
      required:
        - result

    ClaimResult:
      type: object
      properties:
        type:
          type: string
          enum:
            - REJECTED
            - GONE_FOR_APPROVAL
            - CREATED
        reject_details:
          type: string
          enum:
            - CANNOT_FIND_REGION
            - REGION_NOT_IN_APPROVAL
            - REGION_HAS_NO_OWNER
            - ZONE_FETCH_ERROR
            - POLYGAMOUS_ZONE_RELATIONSHIP
            - UNACCEPTABLE_ZONE_RELATIONSHIP
            - PLOT_ZONE_CONTROLS
            - UNACCEPTABLE_REGION_OVERLAP
            - ACTIVE_REGION_OVERLAP
            - APPROVAL_CATEGORY_FAILED
        region_id:
          type: integer
          format: int32
        approvals:
          type: array
          items:
            $ref: '#/components/schemas/Approval'
      required:
        - result_type

    Coordinate:
      type: object
      properties:
        latitude:
          type: number
          format: double
          description: Latitude
          minimum: -90
          maximum: 90
        longitude:
          type: number
          format: double
          description: Longitude
          minimum: -180
          maximum: 180
      required:
        - latitude
        - longitude

    ApprovalType:
      type: string
      enum:
        - CLAIM_AREA
        - TOTAL_CLAIMED_AREA
        - INACTIVE_OVERLAP
        - SECTION_SAVE_OVERLAP
    ApprovalStatus:
      type: string
      enum:
        - REQUIRE_APPROVAL
        - FAIL
    Approval:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/ApprovalType'
        status:
          $ref: '#/components/schemas/ApprovalStatus'
      required:
        - type
        - status

    CreateTeamRequest:
      type: object
      properties:
        name:
          type: string
      required:
        - name
    CreateTeamResponse:
      type: object
      properties:
        id:
          type: integer
          format: int32
      required:
        - id
    DeleteTeamRequest:
      type: object
      properties:
        id:
          type: integer
          format: int32
      required:
        - id
    Team:
      type: object
      properties:
        id:
          type: integer
          format: int32
        name:
          type: string
      required:
        - id
        - name
    CreateTeamRegionRequest:
      type: object
      properties:
        name:
          type: string
        teamId:
          type: integer
          format: int32
        geometry_bounds:
          type: array
          items:
            $ref: '#/components/schemas/Coordinate'
          minItems: 4
      required:
        - name
        - teamId
        - geometry_bounds
    CreateTeamRegionResponse:
      type: object
      properties:
        id:
          type: integer
          format: int32
      required:
        - id
    DeleteTeamRegionRequest:
      type: object
      properties:
        id:
          type: integer
          format: int32
      required:
        - id
    SwitchTeamRegionRequest:
      type: object
      properties:
        id:
          type: integer
          format: int32
        newTeamId:
          type: integer
          format: int32
      required:
        - id
